name: gmsad

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends krb5-config libkrb5-dev

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,fuzz]

      - name: Audit dependencies
        run: |
          python -m pip install pip-audit
          pip-audit

      - name: Lint with Ruff
        run: |
          python -m ruff check gmsad tests scripts

      - name: Type check with Mypy
        run: |
          python -m mypy gmsad tests

      - name: Test with pytest and coverage
        run: |
          python -m pytest --cov=gmsad tests/ -v

      - name: Run fuzz harness regression check
        run: |
          mkdir -p tests/corpus tests/corpus_gmsa
          python tests/fuzz_keytab.py -runs=5000 -dict=tests/keytab.dict tests/corpus
          python tests/fuzz_gmsa.py -runs=5000 tests/corpus_gmsa
